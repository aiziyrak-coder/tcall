<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Tcall — Internet yo'q</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f2f2f7;
      color: #1c1c1e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .card {
      max-width: 320px;
      background: #fff;
      border-radius: 20px;
      padding: 32px 24px;
      box-shadow: 0 8px 32px rgba(0,0,0,.08);
    }
    h1 { font-size: 20px; margin-bottom: 8px; }
    p { font-size: 15px; color: #636366; line-height: 1.5; margin-bottom: 20px; }
    button {
      background: #007aff;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 14px 24px;
      font-size: 16px;
      font-weight: 600;
      width: 100%;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Internet yo'q</h1>
    <p>Tarmoq ulanishini tekshiring va qayta urinib ko'ring.</p>
    <button onclick="location.reload()">Qayta urinish</button>
  </div>
</body>
</html>
